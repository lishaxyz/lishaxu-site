<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- maximum-scale=1 stops iOS Safari's auto-zoom when focusing inputs (the app
     is a fixed-viewport tool with its own canvas pinch-zoom); iOS still allows
     manual accessibility pinch-zoom regardless of this setting. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Gallery Wall Planner — Lisha Xu</title>
<meta name="description" content="Free tool: upload a photo of your wall and arrange artwork to scale before you buy or hang anything.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="canonical" href="https://lishaxu.com/planner/">
<meta property="og:title" content="Gallery Wall Planner — Lisha Xu">
<meta property="og:description" content="Upload a photo of your wall and arrange artwork to scale before you buy or hang anything.">
<meta property="og:url" content="https://lishaxu.com/planner/">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overscroll-behavior:none;background:#e9ecf1}
#root{height:100%}
input,button,textarea{font-family:inherit}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:99px}
/* Mobile browsers auto-zoom the page when a focused input's font is under
   16px, cutting off the tool. Overrides the app's inline 14px on touch
   devices only; desktop keeps the designed size. */
@media (pointer: coarse){
  input[inputmode], input[type="text"], textarea{font-size:16px !important}
}
</style>
<!-- Plausible analytics; the outbound-links extension tracks Buy/Etsy clicks in the planner. -->
<script defer data-domain="lishaxu.com" src="https://plausible.io/js/script.tagged-events.outbound-links.js"></script>
</head>
<body>
<div id="root"></div>
<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script src="../vendor/htm.umd.js"></script>
<script src="planner.js"></script>
</body>
</html>
